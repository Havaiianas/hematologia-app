<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hematolog.IA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Archivo:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#05080F; min-height:100vh; overflow:hidden; font-family:'Inter',-apple-system,system-ui,sans-serif; }
  #root { min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 30% 20%,rgba(192,57,43,0.08),transparent 50%), radial-gradient(ellipse at 70% 80%,rgba(59,126,168,0.06),transparent 50%), #05080F; }
  *::-webkit-scrollbar { display:none; }
  @keyframes scan    { 0%{top:0%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100%;opacity:0} }
  @keyframes pulse   { 0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.5)} 50%{box-shadow:0 0 0 10px rgba(192,57,43,0)} }
  @keyframes fadeUp  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes typing  { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }
  @keyframes spin    { to{transform:rotate(360deg)} }
  input::placeholder { color:rgba(240,244,248,0.35); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="https://unpkg.com/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="api.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens2.jsx"></script>
<script type="text/babel" src="screens3.jsx"></script>
<script type="text/babel" src="screens4.jsx"></script>
<script type="text/babel" src="main.jsx"></script>
</body>
</html>
